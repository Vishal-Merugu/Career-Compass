<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareerCompass</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header__brand">
          <div class="header__icon">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <rect x="2" y="2" width="20" height="20" rx="2" ry="2" />
              <path d="M12 18V12M12 12V6M12 12H6M12 12H18" />
            </svg>
          </div>
          <h1 class="header__title">CareerCompass</h1>
        </div>
        <div class="header__status" id="statusBadge">
          <span class="status-dot" id="statusDot"></span>
          <span
            id="statusText"
            style="
              font-family: &quot;JetBrains Mono&quot;, monospace;
              font-size: 10px;
              font-weight: 700;
            "
            >Ready</span
          >
        </div>
      </header>

      <!-- Navigation -->
      <nav class="tabs">
        <button class="tab active" data-tab="outreach">Outreach</button>
        <button class="tab" data-tab="dashboard">Dashboard</button>
        <button class="tab" data-tab="activity">Activity</button>
        <button class="tab" data-tab="config">Settings</button>
        <button class="tab" data-tab="history">History</button>
      </nav>

      <!-- Outreach Panel (Default) -->
      <section class="panel active" id="tab-outreach">
        <div class="form-group">
          <label>> Target Keywords</label>
          <input type="text" id="cfgKeywords" placeholder="KW_01, KW_02..." />
        </div>
        <div class="form-group">
          <label>> Target Locations</label>
          <input
            type="text"
            id="cfgLocations"
            placeholder="LOC_01, LOC_02..."
          />
        </div>
        <div class="form-group">
          <label>> Daily Connection Limit</label>
          <input type="number" id="cfgDailyLimit" value="15" />
        </div>
        <div class="form-group">
          <label>> About Me (Context for AI)</label>
          <textarea
            id="cfgUserContext"
            placeholder="Introduce yourself... e.g. I am a CS student looking for internships."
          ></textarea>
        </div>
        <div class="form-group">
          <label>> Target Geo ID</label>
          <input type="text" id="cfgTargetGeoId" placeholder="101282230" />
        </div>

        <button
          class="btn btn-primary"
          id="btnSaveConfigOutreach"
          style="margin-top: 12px"
        >
          <span class="loader"></span>
          <span class="btn-text">Save Outreach Config</span>
        </button>
      </section>

      <!-- Dashboard Panel -->
      <section class="panel" id="tab-dashboard">
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="statConnections">0</span>
            <span class="stat-label">Requests Sent</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statLimit">15</span>
            <span class="stat-label">Daily Limit</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statJobs">0</span>
            <span class="stat-label">Leads Found</span>
          </div>
          <div class="stat-card" style="border-color: var(--tech-cyan)">
            <span class="stat-value" id="statCompanies">0</span>
            <span class="stat-label">Companies</span>
          </div>
        </div>
      </section>

      <!-- Activity Panel -->
      <section class="panel flex-panel" id="tab-activity">
        <div class="form-group flex-group">
          <label>> Live Activity Log</label>
          <div class="activity-log flex-log" id="activityLog">
            <div class="log-empty">
              // Pipeline inactive. Waiting for start command...
            </div>
          </div>
        </div>
      </section>

      <!-- Config/Settings Panel -->
      <section class="panel" id="tab-config">
        <div class="form-group">
          <label>> LLM Provider</label>
          <select id="cfgLlmProvider">
            <option value="ollama">Ollama (Local / Hosted)</option>
            <option value="gemini">Gemini API</option>
            <option value="openrouter">OpenRouter</option>
          </select>
        </div>

        <div class="form-group" id="groupLlmUrl">
          <label>> Base URL</label>
          <input
            type="text"
            id="cfgLlmUrl"
            placeholder="http://localhost:11434"
          />
        </div>

        <div class="form-group" id="groupLlmApiKey" style="display: none">
          <label>> API Key</label>
          <input
            type="password"
            id="cfgLlmApiKey"
            placeholder="Enter API Key"
          />
        </div>

        <div class="form-group">
          <label id="lblLlmModel">> AI Model (Fetch to Populate)</label>
          <div style="display: flex; gap: 8px; align-items: stretch">
            <select id="cfgLlmModel" style="flex: 1; min-height: 38px">
              <option value="">Select a model...</option>
            </select>
            <button
              class="btn btn-secondary"
              id="btnCheckLlm"
              style="padding: 0 12px; width: auto; flex-shrink: 0"
              title="Test Connection / Fetch Models"
            >
              <span class="loader"></span>
              <span class="btn-text">Test AI Connection</span>
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"
                ></path>
              </svg>
            </button>
          </div>
          <div
            id="llmStatusText"
            style="
              font-family: &quot;JetBrains Mono&quot;, monospace;
              font-size: 10px;
              color: var(--tech-muted);
              margin-top: 6px;
            "
          >
            Not Connected
          </div>
        </div>

        <button
          class="btn btn-primary"
          id="btnSaveConfig"
          style="margin-top: 24px"
        >
          <span class="loader"></span>
          <span class="btn-text">Save Configuration</span>
        </button>
        <button
          class="btn btn-secondary"
          id="btnReset"
          style="margin-top: 24px; font-size: 11px"
        >
          <span class="loader"></span>
          <span class="btn-text">Reset Daily Counter</span>
        </button>
        <button
          class="btn btn-danger"
          id="btnResetAll"
          style="margin-top: 12px; font-size: 10px; padding: 8px"
        >
          // Reset All Data
        </button>
      </section>

      <!-- Logs/History Panel -->
      <section class="panel" id="tab-history">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
          "
        >
          <label
            style="
              margin: 0;
              font-family: &quot;JetBrains Mono&quot;, monospace;
              font-size: 11px;
              color: var(--tech-accent);
            "
            >Sent History</label
          >
          <button
            class="btn btn-secondary"
            id="btnExportCSV"
            style="width: auto; padding: 6px 12px; font-size: 10px"
          >
            Export CSV
          </button>
        </div>

        <div
          style="
            background: #000;
            border: 1px solid var(--tech-border);
            border-radius: var(--radius-sharp);
          "
        >
          <table class="history-table" id="historyTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Entity Name</th>
                <th>Result</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr>
                <td
                  colspan="3"
                  style="
                    text-align: center;
                    color: var(--tech-muted);
                    padding: 20px;
                  "
                >
                  // No records found.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Persistent Command Bar -->
      <footer class="command-bar">
        <div class="command-actions">
          <button class="btn btn-primary" id="btnStart">
            <span class="loader"></span>
            <svg
              id="startIcon"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <span class="btn-text">Launch</span>
          </button>
          <button class="btn btn-warning" id="btnPause">
            <span class="loader"></span>
            <span class="btn-text">Pause</span>
          </button>
          <button class="btn btn-danger" id="btnStop">
            <span class="loader"></span>
            <span class="btn-text">Stop</span>
          </button>
        </div>
      </footer>

      <!-- Auth Warning Overlay -->
      <div id="authOverlay" class="auth-overlay">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          ></path>
        </svg>
        <h2 id="authTitle">LinkedIn Required</h2>
        <p id="authMessage">
          Please open this extension on an active LinkedIn tab to use the
          outreach pipeline.
        </p>
      </div>
    </div>

    <script src="popup.js"></script>
    <!-- Hidden Compatibility -->
    <div style="display: none">
      <span id="logCount">0</span>
      <span id="llmDot"></span>
      <span id="statusBadge"></span>
    </div>
  </body>
</html>
